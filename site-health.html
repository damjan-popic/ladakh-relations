<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ladakh Relations Site Health</title><style>body{font-family:system-ui;margin:2rem;line-height:1.5;background:#f7f3ea;color:#1f2937}.ok{color:#126b36;font-weight:800}.bad{color:#a21c1c;font-weight:800}code{background:#eee0cb;padding:.1rem .3rem;border-radius:5px}</style></head><body><h1>Site health</h1><div id="out">Checking…</div><script>const files=['index.html','app.js','style.css','data/ladakh_graph.json','data/places.geojson','data/corpus_index.json','data/candidate_links.json','data/entity_mentions.json','data/annotation_queue.json','data/place_coordinate_backlog.csv','docs/ARCHITECTURE.md'];Promise.all(files.map(async f=>{try{const r=await fetch(f,{cache:'no-store'});return {f,ok:r.ok,status:r.status}}catch(e){return {f,ok:false,status:e.message}}})).then(rows=>{out.innerHTML=rows.map(r=>`<div><span class="${r.ok?'ok':'bad'}">${r.ok?'OK':'FAIL'}</span> <code>${r.f}</code> ${r.status}</div>`).join('')})</script></body></html>
