<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ladakh Relations — Site Health Check</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;margin:2rem;line-height:1.45;color:#1f2937;background:#f7f9fc}
    h1{margin-bottom:.25rem}.hint{color:#5f6b7a}table{border-collapse:collapse;width:100%;background:white;margin-top:1rem}th,td{border:1px solid #d9e0ea;padding:.6rem;text-align:left}th{background:#eef3f9}.ok{color:#087f5b;font-weight:700}.bad{color:#c92a2a;font-weight:700}.pending{color:#7c6f00;font-weight:700}code{background:#eef2f7;padding:.1rem .25rem;border-radius:.25rem}.small{font-size:.9rem}
  </style>
</head>
<body>
  <h1>Ladakh Relations — Site Health Check</h1>
  <p class="hint">This page verifies that the static files required by the network/map app are actually being served by GitHub Pages.</p>
  <p><a href="index.html">Back to the visualization</a></p>
  <table>
    <thead><tr><th>File</th><th>Status</th><th>Notes</th></tr></thead>
    <tbody id="checks"></tbody>
  </table>
  <p id="summary" class="small"></p>
<script>
const required = [
  ['index.html', 'Main page'],
  ['app.js', 'Visualization JavaScript'],
  ['style.css', 'Visualization styles'],
  ['data/ladakh_graph.json', 'Main graph database JSON'],
  ['data/meetings_timeline.json', 'Meeting/visit timeline JSON'],
  ['data/places.geojson', 'Map markers GeoJSON'],
  ['data/place_links.geojson', 'Optional place-to-place link GeoJSON; may contain zero features'],
  ['data/place_coordinate_backlog.csv', 'Map enrichment backlog CSV'],
  ['docs/map_enrichment_workflow.md', 'Map enrichment workflow documentation'],
  ['scripts/build_graph.py', 'Rebuild script, not needed by browser but should be in repo']
];
const tbody = document.getElementById('checks');
function row(file, status, notes){
  const cls = status === 'OK' ? 'ok' : status === 'PENDING' ? 'pending' : 'bad';
  const tr = document.createElement('tr');
  tr.innerHTML = `<td><code>${file}</code></td><td class="${cls}">${status}</td><td>${notes}</td>`;
  tbody.appendChild(tr);
}
async function checkFile(file, notes){
  try {
    const res = await fetch(file, { cache: 'no-store' });
    if (!res.ok) { row(file, 'MISSING', `HTTP ${res.status}. ${notes}`); return false; }
    const text = await res.text();
    row(file, 'OK', `${text.length.toLocaleString()} bytes. ${notes}`);
    return true;
  } catch (err) {
    row(file, 'MISSING', `${err.message}. ${notes}`);
    return false;
  }
}
(async()=>{
  let ok = 0;
  for (const [file, notes] of required) if (await checkFile(file, notes)) ok++;
  document.getElementById('summary').innerHTML = ok === required.length
    ? `<span class="ok">All ${ok} checks passed.</span>`
    : `<span class="bad">${required.length - ok} file(s) are missing or unreachable.</span> Upload the full repo contents to the repository root and commit again.`;
})();
</script>
</body>
</html>
